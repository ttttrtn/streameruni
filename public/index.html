<script>
const PARENT_DOMAIN = "streameruni.onrender.com";

let userInteracted = false;
let mainPlayer = null;
let sidePlayers = [null, null, null];

let currentMainChannel = null;
let currentSideChannels = ["", "", ""];

function safePlay(player, muted=false) {
  if (!player) return;

  player.setMuted(muted);

  let tries = 0;

  const timer = setInterval(() => {
    try {
      player.play();
      player.setMuted(muted);
    } catch(e) {}

    tries++;

    if (tries >= 15) {
      clearInterval(timer);
    }
  }, 500);
}


function enableAudio() {
  userInteracted = true;

  document
    .getElementById("interaction-overlay")
    .classList.add("hidden");

  if (mainPlayer) {
    mainPlayer.setMuted(false);
    safePlay(mainPlayer,false);
  }

  sidePlayers.forEach(p=>{
    if(p){
      safePlay(p,true);
    }
  });
}



function createPlayer(id,channel,muted){

  document.getElementById(id).innerHTML="";

  let player = new Twitch.Player(id,{
    channel:channel,
    parent:[PARENT_DOMAIN],
    width:"100%",
    height:"100%",
    autoplay:true,
    muted:muted,
    controls:false
  });


  player.addEventListener(
    Twitch.Player.READY,
    ()=>{
      player.setQuality("chunked");
      safePlay(player,muted);
    }
  );


  player.addEventListener(
    Twitch.Player.PLAY,
    ()=>{
      player.setMuted(muted);
    }
  );


  return player;
}



function swapChannel(player,newChannel,muted){

  if(!player) return;

  player.setChannel(newChannel);

  setTimeout(()=>{
    safePlay(player,muted);
  },1000);

  setTimeout(()=>{
    safePlay(player,muted);
  },3000);

  setTimeout(()=>{
    safePlay(player,muted);
  },6000);
}



function renderMain(stream){

 const label=document.getElementById("main-label");

 if(!stream){
   label.style.display="none";
   return;
 }


 if(!mainPlayer){

   mainPlayer=createPlayer(
     "main-player",
     stream.channel,
     true
   );

   currentMainChannel=stream.channel;

 }

 else if(currentMainChannel!==stream.channel){

   currentMainChannel=stream.channel;

   swapChannel(
     mainPlayer,
     stream.channel,
     !userInteracted
   );
 }


 label.style.display="flex";
 label.innerHTML=
 `<span class="live-dot"></span>
 ${stream.channel} · ${stream.viewers.toLocaleString()} viewers`;

}




function renderSidebar(streams){

 for(let i=0;i<3;i++){

   let stream=streams[i];

   let label=document.getElementById(
     `side-label-${i}`
   );


   if(!stream){

     label.style.display="none";
     continue;
   }


   if(!sidePlayers[i]){

     sidePlayers[i]=createPlayer(
       `side-player-${i}`,
       stream.channel,
       true
     );

     currentSideChannels[i]=stream.channel;

   }

   else if(
     currentSideChannels[i]!==stream.channel
   ){

     currentSideChannels[i]=stream.channel;

     swapChannel(
       sidePlayers[i],
       stream.channel,
       true
     );

   }


   label.style.display="flex";
   label.textContent=
   `${stream.channel} · ${stream.viewers.toLocaleString()}`;

 }

}



async function refresh(){

 try{

 const res=await fetch("/api/status");
 const data=await res.json();

 const streams=data.streams || [];

 renderMain(streams[0] || null);

 renderSidebar(streams.slice(1,4));


 }catch(e){

 console.error(
 "stream refresh failed",
 e
 );

 }

}


refresh();

setInterval(
 refresh,
 60000
);

</script>
