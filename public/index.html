<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Streamer University — Live Director</title>
<style>
  :root {
    color-scheme: dark;
    /* Chat placeholder defaults — all overridable via URL query params, see script below. */
    --chat-border-width: 3px;
    --chat-border-radius: 10px;
    --chat-border-opacity: 0.8;
    --chat-border-color: 145, 70, 255; /* r,g,b — combined with opacity above */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    /* Transparent so this works cleanly as an OBS Browser Source over other sources/scenes. */
    background: transparent;
    color: #efeff1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* ---------- POV grid (Main + sidebar) ---------- */
  .pov-grid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0; /* resized dynamically to leave room for chat placeholder */
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 6px;
    padding: 6px;
  }
  .main-pov-wrap {
    position: relative;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 6px;
    overflow: hidden;
    min-width: 0;
  }
  .main-pov-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
  .main-pov-label {
    position: absolute;
    left: 8px;
    bottom: 8px;
    font-size: 13px;
    background: rgba(0, 0, 0, 0.55);
    padding: 3px 8px;
    border-radius: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #eb0400;
    display: inline-block;
  }
  .side-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .side-tile {
    position: relative;
    flex: 1;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 6px;
    overflow: hidden;
    min-height: 0;
  }
  .side-tile iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
  .side-label {
    position: absolute;
    left: 6px;
    bottom: 6px;
    font-size: 11px;
    background: rgba(0, 0, 0, 0.55);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .empty-tile {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(255, 255, 255, 0.3);
    font-size: 12px;
  }

  /* ---------- Chat placeholder frame ---------- */
  .chat-placeholder {
    position: absolute;
    box-sizing: border-box;
    border-style: solid;
    border-width: var(--chat-border-width);
    border-radius: var(--chat-border-radius);
    border-color: rgba(var(--chat-border-color), var(--chat-border-opacity));
    background: transparent;
    pointer-events: none; /* never intercepts clicks meant for your real chat source */
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="pov-grid" id="pov-grid">
      <div class="main-pov-wrap" id="main-pov-wrap">
        <div class="empty-tile">No main stream live</div>
      </div>
      <div class="side-col" id="side-col">
        <div class="side-tile"><div class="empty-tile">POV #2</div></div>
        <div class="side-tile"><div class="empty-tile">POV #3</div></div>
        <div class="side-tile"><div class="empty-tile">POV #4</div></div>
      </div>
    </div>

    <!-- Empty visual placeholder only. Your existing chat overlay source
         goes in OBS as its own Browser Source, positioned on top of this
         frame. This div never loads chat content or calls any chat API. -->
    <div class="chat-placeholder" id="chat-placeholder"></div>
  </div>

<script>
  // ============================================================
  // Chat placeholder configuration via URL query params.
  // ============================================================
  const params = new URLSearchParams(location.search);

  function num(name, fallback) {
    const v = parseFloat(params.get(name));
    return Number.isFinite(v) ? v : fallback;
  }

  const chatBorderWidth = num("chatBorderWidth", 3);      // px
  const chatBorderRadius = num("chatBorderRadius", 10);   // px
  const chatBorderOpacity = num("chatBorderOpacity", 0.8); // 0-1
  const chatColor = params.get("chatColor") || "145, 70, 255"; // "r,g,b"

  const chatTop = num("chatTop", 82);      // %
  const chatLeft = num("chatLeft", 0);     // %
  const chatWidth = num("chatWidth", 100); // %
  const chatHeight = num("chatHeight", 18); // %

  const root = document.documentElement.style;
  root.setProperty("--chat-border-width", `${chatBorderWidth}px`);
  root.setProperty("--chat-border-radius", `${chatBorderRadius}px`);
  root.setProperty("--chat-border-opacity", chatBorderOpacity);
  root.setProperty("--chat-border-color", chatColor);

  const chatEl = document.getElementById("chat-placeholder");
  chatEl.style.top = `${chatTop}%`;
  chatEl.style.left = `${chatLeft}%`;
  chatEl.style.width = `${chatWidth}%`;
  chatEl.style.height = `${chatHeight}%`;

  document.getElementById("pov-grid").style.bottom = `${100 - chatTop}%`;

  // ============================================================
  // POV embeds (Main + sidebar)
  // ============================================================
  const PARENT_DOMAIN = "streameruni.onrender.com";
  const POLL_MS = 60 * 1000;
  const SIDEBAR_SIZE = 3;

  let currentMainChannel = null;

  // We now accept a "muted" parameter (defaulting to true) and append autoplay options
  function twitchEmbedSrc(channel, muted = true) {
    return `https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${PARENT_DOMAIN}&muted=${muted}&autoplay=true`;
  }

  function renderMain(stream) {
    const wrap = document.getElementById("main-pov-wrap");
    if (!stream) {
      wrap.innerHTML = '<div class="empty-tile">No main stream live</div>';
      currentMainChannel = null;
      return;
    }
    if (stream.channel !== currentMainChannel) {
      // Main stream: muted is set to false, and allow="autoplay" is added to the iframe
      wrap.innerHTML = `<iframe src="${twitchEmbedSrc(stream.channel, false)}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
      currentMainChannel = stream.channel;
    }
    let label = wrap.querySelector(".main-pov-label");
    if (!label) {
      label = document.createElement("div");
      label.className = "main-pov-label";
      wrap.appendChild(label);
    }
    label.innerHTML = `<span class="live-dot"></span>${stream.channel} · ${stream.viewers.toLocaleString()} viewers`;
  }

  function renderSidebar(streams) {
    const col = document.getElementById("side-col");
    const tiles = col.querySelectorAll(".side-tile");
    tiles.forEach((tile, i) => {
      const stream = streams[i];
      if (!stream) {
        tile.innerHTML = `<div class="empty-tile">POV #${i + 2}</div>`;
        return;
      }
      const existingSrc = tile.querySelector("iframe")?.src || "";
      if (!existingSrc.includes(encodeURIComponent(stream.channel))) {
        // Sidebar streams: muted is set to true, and allow="autoplay" is added to the iframe
        tile.innerHTML = `<iframe src="${twitchEmbedSrc(stream.channel, true)}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
      }
      let label = tile.querySelector(".side-label");
      if (!label) {
        label = document.createElement("div");
        label.className = "side-label";
        tile.appendChild(label);
      }
      label.textContent = `${stream.channel} · ${stream.viewers.toLocaleString()}`;
    });
  }

  async function refresh() {
    try {
      const res = await fetch("/api/status");
      const data = await res.json();
      const streams = data.streams || [];
      renderMain(streams[0] || null);
      renderSidebar(streams.slice(1, 1 + SIDEBAR_SIZE));
    } catch (err) {
      console.error("status fetch failed", err);
    }
  }

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
