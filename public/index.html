  /* Crucial: Ensure Twitch's nested iframes occupy the full wrapper */
  .player-container iframe {
    width: 100% !important;
    height: 100% !important;
    border: 0;
  }

    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #eb0400;
    display: inline-block;
  }

    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }

    position: absolute;
    box-sizing: border-box;
    border-style: solid;
    border-width: var(--chat-border-width);
    border-radius: var(--chat-border-radius);
    border-color: rgba(var(--chat-border-color), var(--chat-border-opacity));
    background: transparent;
    pointer-events: none; 
    z-index: 10;

<!-- Load official interactive JS SDK -->
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>

  <div class="stage">
    <div class="pov-grid" id="pov-grid">
      <div class="main-pov-wrap" id="main-pov-wrap">
        <!-- Added explicit allow policies to the parent containers -->
        <div id="main-player" class="player-container" allow="autoplay; encrypted-media; fullscreen">
          <div class="empty-tile">No main stream live</div>
        </div>
      </div>
      <div class="side-col" id="side-col">
        <div class="side-tile">
          <div id="side-player-1" class="player-container" allow="autoplay; encrypted-media; fullscreen">
            <div class="empty-tile">POV #2</div>
          </div>
        </div>
        <div class="side-tile">
          <div id="side-player-2" class="player-container" allow="autoplay; encrypted-media; fullscreen">
            <div class="empty-tile">POV #3</div>
          </div>
        </div>
        <div class="side-tile">
          <div id="side-player-3" class="player-container" allow="autoplay; encrypted-media; fullscreen">
            <div class="empty-tile">POV #4</div>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-placeholder" id="chat-placeholder"></div>
  </div>

<script>
  // ============================================================
  // Chat placeholder configuration via URL query params.
  // ============================================================
  const params = new URLSearchParams(location.search);

  function num(name, fallback) {
    const v = parseFloat(params.get(name));
    return Number.isFinite(v) ? v : fallback;
  }

  const chatBorderWidth = num("chatBorderWidth", 3);
  const chatBorderRadius = num("chatBorderRadius", 10);
  const chatBorderOpacity = num("chatBorderOpacity", 0.8);
  const chatColor = params.get("chatColor") || "145, 70, 255";

  const chatTop = num("chatTop", 82);
  const chatLeft = num("chatLeft", 0);
  const chatWidth = num("chatWidth", 100);
  const chatHeight = num("chatHeight", 18);

  const root = document.documentElement.style;
  root.setProperty("--chat-border-width", `${chatBorderWidth}px`);
  root.setProperty("--chat-border-radius", `${chatBorderRadius}px`);
  root.setProperty("--chat-border-opacity", chatBorderOpacity);
  root.setProperty("--chat-border-color", chatColor);

  const chatEl = document.getElementById("chat-placeholder");
  chatEl.style.top = `${chatTop}%`;
  chatEl.style.left = `${chatLeft}%`;
  chatEl.style.width = `${chatWidth}%`;
  chatEl.style.height = `${chatHeight}%`;

  document.getElementById("pov-grid").style.bottom = `${100 - chatTop}%`;

  // ============================================================
  // POV embeds (Main + sidebar)
  // ============================================================
  const PARENT_DOMAIN = "streameruni.onrender.com";
  const POLL_MS = 60 * 1000;
  
  let mainPlayer = null;
  let sidebarPlayers = [null, null, null];
  let currentMainChannel = null;
  let currentSidebarChannels = [null, null, null];

  function renderMain(stream) {
    const container = document.getElementById("main-player");
    if (!stream) {
      container.innerHTML = '<div class="empty-tile">No main stream live</div>';
      currentMainChannel = null;
      mainPlayer = null;
      return;
    }

    if (stream.channel !== currentMainChannel) {
      container.innerHTML = "";
      currentMainChannel = stream.channel;

      // Crucial: Load as MUTED first so the browser permits immediate autoplay.
      mainPlayer = new Twitch.Player("main-player", {
        channel: stream.channel,
        parent: [PARENT_DOMAIN],
        width: "100%",
        height: "100%",
        autoplay: true,
        muted: true,
        controls: false
      });

      // Immediately unmute once playback has safely initiated 
      mainPlayer.addEventListener(Twitch.Player.READY, () => {
        mainPlayer.setQuality("chunked");
        mainPlayer.play();
        
        // Short timeout allows browser to register playback before unmuting
        setTimeout(() => {
          if (mainPlayer) {
            mainPlayer.setMuted(false);
          }
        }, 800);
      });
    }

    let label = document.getElementById("main-pov-wrap").querySelector(".main-pov-label");
    if (!label) {
      label = document.createElement("div");
      label.className = "main-pov-label";
      document.getElementById("main-pov-wrap").appendChild(label);
    }
    label.innerHTML = `<span class="live-dot"></span>${stream.channel} · ${stream.viewers.toLocaleString()} viewers`;
  }

  function renderSidebar(streams) {
    for (let i = 0; i < 3; i++) {
      const stream = streams[i];
      const containerId = `side-player-${i+1}`;
      const container = document.getElementById(containerId);
      const parentTile = container.closest(".side-tile");

      if (!stream) {
        container.innerHTML = `<div class="empty-tile">POV #${i + 2}</div>`;
        currentSidebarChannels[i] = null;
        sidebarPlayers[i] = null;
        continue;
      }

      if (stream.channel !== currentSidebarChannels[i]) {
        container.innerHTML = "";
        currentSidebarChannels[i] = stream.channel;

        sidebarPlayers[i] = new Twitch.Player(containerId, {
          channel: stream.channel,
          parent: [PARENT_DOMAIN],
          width: "100%",
          height: "100%",
          autoplay: true,
          muted: true, // Sidebars remain muted
          controls: false
        });

        sidebarPlayers[i].addEventListener(Twitch.Player.READY, () => {
          sidebarPlayers[i].setQuality("720p30");
          sidebarPlayers[i].play();
        });
      }

      let label = parentTile.querySelector(".side-label");
      if (!label) {
        label = document.createElement("div");
        label.className = "side-label";
        parentTile.appendChild(label);
      }
      label.textContent = `${stream.channel} · ${stream.viewers.toLocaleString()}`;
    }
  }

  async function refresh() {
    try {
      const res = await fetch("/api/status");
      const data = await res.json();
      const streams = data.streams || [];
      renderMain(streams[0] || null);
      renderSidebar(streams.slice(1, 4));
    } catch (err) {
      console.error("status fetch failed", err);
    }
  }

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
